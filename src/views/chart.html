<div class="glass-card animate__animated animate__fadeIn" style="width: 100%; max-width: 700px;">
    <h2 style="margin-top: 0; text-align: center;">Statistiques Avancées</h2> <br>
    
    <div style="display: flex; gap: 10px; margin-bottom: 15px; justify-content: center; flex-wrap: wrap;">
        <select id="chart-type" class="glass-input">
            <option value="line" style="color: black;">Courbe</option>
            <option value="bar" style="color: black;">Barres</option>
            <option value="doughnut" style="color: black;">Camembert</option>
        </select>
        
        <select id="chart-data" class="glass-input">
            <option value="balance" style="color: black;">Évolution du Solde Global</option>
            <option value="monthly" style="color: black;">Flux Mensuel (Gain vs Dépense)</option>
            <option value="compare" style="color: black;">Répartition Globale</option>
        </select>
    </div>

    <div style="display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; flex-wrap: wrap; align-items: center;">
        <span style="color: var(--text-dim); font-weight: bold;">Du</span>
        <input type="date" id="chart-start-date" class="glass-input">
        
        <span style="color: var(--text-dim); font-weight: bold;">au</span>
        <input type="date" id="chart-end-date" class="glass-input">
    </div>

    <div style="position: relative; height: 350px; width: 100%;">
        <canvas id="myChart"></canvas>
    </div>
</div>
